data:
  start: "2012-01-01"
  end: "2025-01-01"
  target_ticker: "^GSPC"
  feature_tickers:
    - "^VIX"
    - "^TNX"
    - "DX-Y.NYB"
    - "XLK"
    - "XLF"
    - "XLE"

features:
  heuristic_tau: 2
  heuristic_embed_dim: 3
  heuristic_window_len: 80
  heuristic_kde_bandwidth: 0.6
  density_quantile: 0.05

training:
  seed: 42
  test_size: 0.2
  lstm_seq_len: 20
  lstm_epochs: 30
  optuna_lstm_epochs: 12
  lstm_hidden_size: 64
  batch_size: 64

experiments:
  stress_noise_prob: 0.02
  stress_noise_scale: 8.0

optimization:
  n_trials: 24
  h0_activity_weight: 0.08
  tau_min: 1
  tau_max: 5
  embed_dim_min: 2
  embed_dim_max: 5
  window_min: 50
  window_max: 120
  kde_bw_min: 0.2
  kde_bw_max: 1.5
  grid_search:
    enabled: true
    max_configs: 80
    top_k_for_warmstart: 8
    lstm_epochs: 10
    tau: [1, 2, 3, 4, 5]
    embed_dim: [2, 3, 4, 5]
    window_len: [45, 55, 65, 75, 85, 95, 105, 115, 120]
    kde_bandwidth: [0.2, 0.35, 0.5, 0.65, 0.85, 1.05, 1.25, 1.45]
    density_quantile: [0.02, 0.04, 0.06, 0.08, 0.10, 0.12, 0.16, 0.20]

paths:
  results_dir: "results"
  plots_dir: "plots_and_visualizations"
